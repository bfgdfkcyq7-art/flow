{% extends "auth_base.html" %}
{% block title %}Flow · 登录{% endblock %}

{% block content %}
<section class="card auth-card">
  <div class="auth-card-inner">
    <h2 class="auth-title">欢迎回来</h2>
    <form id="login-form" class="form-card" method="post" action="#">
      <div class="field">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="你的用户名" required />
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="输入密码" required />
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">登录</button>
    </form>
    <div class="auth-divider"></div>
    <p class="auth-switch">
      还没有账号？<a href="/register">创建一个</a>
    </p>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>window.FLOW_AUTH_MODE = "login";</script>
<script src="/static/js/auth.js"></script>
{% endblock %}
