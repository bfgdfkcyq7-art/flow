{% extends "auth_base.html" %}
{% block title %}Flow · 注册{% endblock %}

{% block content %}
<section class="card auth-card">
  <div class="auth-card-inner">
    <h2 class="auth-title">开始记录</h2>
    <form id="register-form" class="form-card" method="post" action="#">
      <div class="field">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="取一个喜欢的名字" required minlength="2" maxlength="32" />
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" autocomplete="new-password" placeholder="至少 6 位" required minlength="6" />
      </div>
      <div class="field">
        <label for="password_confirm">确认密码</label>
        <input type="password" id="password_confirm" name="password_confirm" autocomplete="new-password" placeholder="再输入一次" required minlength="6" />
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">注册</button>
    </form>
    <div class="auth-divider"></div>
    <p class="auth-switch">
      已有账号？<a href="/login">去登录</a>
    </p>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>window.FLOW_AUTH_MODE = "register";</script>
<script src="/static/js/auth.js"></script>
{% endblock %}
